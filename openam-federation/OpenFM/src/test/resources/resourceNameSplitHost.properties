# Host indexes are scheme-agnostic: splitHost() emits "://" rather than the
# resource's own scheme, so a policy on http://host is indexed identically to
# one on https://host. Every entry below therefore expects the same index set,
# and www.SUN.com collapses onto www.sun.com because the host is lower-cased.

